// ═══════ CREW TAB ═══════
function CR({s,onPrj}){
  const[loading,setLoading]=useState(true);
  const[progress,setProgress]=useState({done:0,total:0});
  const[shiftsByMember,setShiftsByMember]=useState({});
  const[filter,setFilter]=useState("all");
  const[expanded,setExpanded]=useState({});

  useEffect(function(){
    var cached=cache.get("crew_aggregate");
    if(cached&&cached.data&&Date.now()-cached.ts<600000){
      setShiftsByMember(cached.data);
      setLoading(false);
      return;
    }
    var cancelled=false;
    (async function(){
      var now=Date.now();
      var cutoff=now-90*86400000;
      var targets=(s.prjAll||[]).filter(function(p){
        var end=p.planperiod_end?new Date(p.planperiod_end).getTime():null;
        return end&&end>=cutoff;
      });
      setProgress({done:0,total:targets.length});
      var byMember={};
      // Concurrency-limited fetch (5 at a time)
      var idx=0;
      async function worker(){
        while(idx<targets.length){
          var i=idx++;
          var p=targets[i];
          try{
            var r=await apiGet("rentman","/projects/"+p.id+"/projectcrew?limit=300");
            var rows=r&&r.data?r.data:(Array.isArray(r)?r:[]);
            rows.forEach(function(cp){
              var mk=cp.crewmember;if(!mk)return;
              if(!byMember[mk])byMember[mk]={ref:mk,shifts:[]};
              byMember[mk].shifts.push({
                projectId:p.id,
                projectName:p.displayname||p.name||("PRJ "+p.id),
                project:p,
                start:cp.planperiod_start,
                end:cp.planperiod_end,
                cost:cp.costs||0,
                hours:Math.round((cp.hours_planned||0)/3600*10)/10,
                status:cp.activity_status
              });
            });
          }catch(e){}
          if(cancelled)return;
          setProgress(function(pp){return{done:pp.done+1,total:pp.total}});
        }
      }
      await Promise.all([worker(),worker(),worker(),worker(),worker()]);
      if(cancelled)return;
      cache.set("crew_aggregate",byMember);
      setShiftsByMember(byMember);
      setLoading(false);
    })();
    return function(){cancelled=true};
  },[s.prjAll]);

  // Aggregate per member with totals
  var members=useMemo(function(){
    var arr=[];
    Object.keys(shiftsByMember).forEach(function(mk){
      var entry=shiftsByMember[mk];
      var member=s.wM&&s.wM[mk];
      var totalCost=entry.shifts.reduce(function(a,sh){return a+(sh.cost||0)},0);
      var totalHours=entry.shifts.reduce(function(a,sh){return a+(sh.hours||0)},0);
      var now=Date.now();
      var upcoming=entry.shifts.filter(function(sh){return sh.start&&new Date(sh.start).getTime()>=now});
      arr.push({ref:mk,member:member,shifts:entry.shifts,totalCost:totalCost,totalHours:totalHours,totalShifts:entry.shifts.length,upcomingCount:upcoming.length});
    });
    // Also include any crew member with no shifts
    (s.crew||[]).forEach(function(w){
      var mk="/crew/"+w.id;
      if(!shiftsByMember[mk]&&w.active&&w.firstname&&!/openapi|webshop|shopify|huren|rentaround|zoef/i.test(w.displayname||"")){
        arr.push({ref:mk,member:w,shifts:[],totalCost:0,totalHours:0,totalShifts:0,upcomingCount:0});
      }
    });
    return arr.sort(function(a,b){return b.upcomingCount-a.upcomingCount||b.totalShifts-a.totalShifts});
  },[shiftsByMember,s.wM,s.crew]);

  var filtered=useMemo(function(){
    return members.filter(function(m){
      if(!m.member)return filter==="all";
      var f=m.member.folder||"";
      if(filter==="all")return true;
      if(filter==="plantilla")return f==="/folders/40";
      if(filter==="crew")return f==="/folders/60";
      if(filter==="freelance")return f==="/folders/43"||f==="/folders/61"||f==="/folders/41";
      if(filter==="license")return m.member.driving_license==="Yes";
      return true;
    });
  },[members,filter]);

  var totals=useMemo(function(){
    var p=members.filter(function(m){return m.member&&m.member.folder==="/folders/40"});
    var c=members.filter(function(m){return m.member&&m.member.folder==="/folders/60"});
    var f=members.filter(function(m){return m.member&&(m.member.folder==="/folders/43"||m.member.folder==="/folders/61"||m.member.folder==="/folders/41")});
    var totalCost=members.reduce(function(a,m){return a+m.totalCost},0);
    return{p:p.length,c:c.length,f:f.length,totalCost:totalCost};
  },[members]);

  // Upcoming 7 days flat list
  var upcoming7=useMemo(function(){
    var now=Date.now(),end=now+7*86400000;
    var all=[];
    members.forEach(function(m){
      m.shifts.forEach(function(sh){
        if(!sh.start)return;
        var t=new Date(sh.start).getTime();
        if(t>=now&&t<=end)all.push({member:m,shift:sh});
      });
    });
    return all.sort(function(a,b){return new Date(a.shift.start)-new Date(b.shift.start)});
  },[members]);

  var fdt=function(d){if(!d)return"—";var dt=new Date(d);return dt.toLocaleDateString("es-ES",{day:"2-digit",month:"short"})+" "+dt.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})};
  var folderLabel=function(f){return f==="/folders/40"?"PLANTILLA":f==="/folders/60"?"CREW":(f==="/folders/43"||f==="/folders/61"||f==="/folders/41")?"FREELANCE":""};

  if(loading){
    var pct=progress.total?Math.round(progress.done/progress.total*100):0;
    return <div>
      <Ref code="SEC-007"/><h2 className="sec-title" style={{fontFamily:"var(--mono)",fontSize:10,fontWeight:400,letterSpacing:4,textTransform:"uppercase",color:"var(--mid)",marginTop:4,marginBottom:40}}>PERSONAL Y TURNOS</h2>
      <div style={{padding:60,textAlign:"center"}}>
        <div style={{fontFamily:"var(--mono)",fontSize:10,letterSpacing:3,color:"var(--mid)",textTransform:"uppercase",marginBottom:16,animation:"blink 1.5s infinite"}}>RECOPILANDO TURNOS · {progress.done}/{progress.total}</div>
        <div style={{maxWidth:400,margin:"0 auto",height:3,background:"var(--border)",position:"relative"}}><div style={{position:"absolute",top:0,left:0,height:"100%",width:pct+"%",background:"var(--accent)",transition:"width 0.3s"}}/></div>
      </div>
    </div>;
  }

  return <div>
    <Ref code="SEC-007"/><h2 className="sec-title" style={{fontFamily:"var(--mono)",fontSize:10,fontWeight:400,letterSpacing:4,textTransform:"uppercase",color:"var(--mid)",marginTop:4,marginBottom:40}}>PERSONAL Y TURNOS</h2>

    <div className="mrow" style={{display:"flex",border:"1px solid var(--border)",marginBottom:32,flexWrap:"wrap"}}>
      <MetricCell label="Personas" value={String(members.length)}/>
      <MetricCell label="Plantilla" value={String(totals.p)}/>
      <MetricCell label="Crew" value={String(totals.c)}/>
      <MetricCell label="Freelance" value={String(totals.f)}/>
      <MetricCell label="Coste 90d" value={eur(totals.totalCost)} highlight/>
    </div>

    <div style={{display:"flex",border:"1px solid var(--border)",marginBottom:32,flexWrap:"wrap"}}>
      {[["all","TODOS"],["plantilla","PLANTILLA"],["crew","CREW"],["freelance","FREELANCE"],["license","CON LICENCIA"]].map(function(x){return <button key={x[0]} onClick={function(){setFilter(x[0])}} style={{padding:"10px 18px",border:"none",borderRight:"1px solid var(--border)",background:filter===x[0]?"var(--accent)":"transparent",color:filter===x[0]?"var(--white)":"var(--mid)",fontFamily:"var(--mono)",fontSize:9,letterSpacing:2,cursor:"pointer",transition:"all 0.2s"}}>{x[1]}</button>})}
    </div>

    <div style={{border:"1px solid var(--border)",marginBottom:40}}>
      {filtered.length===0?<div style={{padding:40,textAlign:"center",fontFamily:"var(--mono)",fontSize:10,color:"var(--dim)",letterSpacing:2}}>SIN RESULTADOS</div>:filtered.map(function(m,i){
        var name=m.member?(m.member.displayname||(m.member.firstname||"")+" "+(m.member.lastname||"")):"Crew #"+m.ref.split("/").pop();
        var fl=m.member?folderLabel(m.member.folder):"";
        var tags=m.member&&m.member.tags?m.member.tags:"";
        var isExp=expanded[m.ref];
        return <div key={i} style={{borderBottom:"1px solid var(--border)"}}>
          <div onClick={function(){setExpanded(function(p){var n={};for(var x in p)n[x]=p[x];n[m.ref]=!n[m.ref];return n})}} className="clickrow" style={{padding:"18px 24px",display:"grid",gridTemplateColumns:"1.4fr 1.6fr 0.9fr",gap:16,alignItems:"center",cursor:"pointer"}}>
            <div>
              <div style={{fontFamily:"var(--mono)",fontSize:13,fontWeight:600,letterSpacing:.5,textTransform:"uppercase"}}>{name}</div>
              <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
                {fl&&<span style={{fontFamily:"var(--mono)",fontSize:8,letterSpacing:2,padding:"2px 6px",border:"1px solid var(--border)",color:"var(--mid)",textTransform:"uppercase"}}>{fl}</span>}
                {tags&&tags.split(",").map(function(t,ti){return <span key={ti} style={{fontFamily:"var(--mono)",fontSize:8,letterSpacing:1,padding:"2px 6px",background:"rgba(44,74,124,0.08)",color:"var(--accent)",textTransform:"uppercase"}}>{t.trim()}</span>})}
                {m.member&&m.member.driving_license==="Yes"&&<span style={{fontFamily:"var(--mono)",fontSize:8,letterSpacing:1,padding:"2px 6px",background:"rgba(44,74,124,0.08)",color:"var(--accent)"}}>CARNET</span>}
              </div>
            </div>
            <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--mid)",letterSpacing:.5}}>
              {m.member&&m.member.email&&<div>{m.member.email}</div>}
              {m.member&&m.member.phone&&<div style={{marginTop:2}}>{m.member.phone}</div>}
              {!(m.member&&(m.member.email||m.member.phone))&&<span style={{color:"var(--dim)"}}>—</span>}
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontFamily:"var(--mono)",fontSize:14,fontWeight:600,color:m.upcomingCount>0?"var(--accent)":"var(--mid)"}}>{m.totalShifts} <span style={{fontSize:9,color:"var(--dim)",letterSpacing:1}}>TURNOS</span></div>
              {m.upcomingCount>0&&<div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--accent)",letterSpacing:1}}>{m.upcomingCount} PRÓXIMOS</div>}
              {m.totalCost>0&&<div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--dim)",marginTop:2}}>{eur(m.totalCost)}</div>}
            </div>
          </div>
          {isExp&&m.shifts.length>0&&<div style={{padding:"4px 24px 20px",background:"#fafaf6"}}>
            {m.shifts.sort(function(a,b){return new Date(b.start)-new Date(a.start)}).map(function(sh,si){
              var future=sh.start&&new Date(sh.start).getTime()>=Date.now();
              return <div key={si} onClick={function(e){e.stopPropagation();onPrj(sh.project)}} className="clickrow" style={{display:"grid",gridTemplateColumns:"1.4fr 1fr 1fr 90px",gap:12,padding:"8px 12px",borderBottom:"1px solid var(--border)",alignItems:"center",cursor:"pointer"}}>
                <div style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:500,textTransform:"uppercase"}}>{sh.projectName}</div>
                <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--mid)"}}>{fdt(sh.start)}</div>
                <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--dim)"}}>→ {fdt(sh.end)}</div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:"var(--mono)",fontSize:10,fontWeight:future?600:400,color:future?"var(--accent)":"var(--dim)"}}>{eur(sh.cost)}</div>
                </div>
              </div>;
            })}
          </div>}
          {isExp&&m.shifts.length===0&&<div style={{padding:"12px 24px 20px",fontFamily:"var(--mono)",fontSize:10,color:"var(--dim)",letterSpacing:1,background:"#fafaf6"}}>SIN TURNOS EN VENTANA</div>}
        </div>;
      })}
    </div>

    {upcoming7.length>0&&<div style={{marginBottom:40}}>
      <Ref code="008"/><div style={{fontFamily:"var(--mono)",fontSize:10,letterSpacing:3,textTransform:"uppercase",color:"var(--mid)",marginTop:4,marginBottom:16}}>PRÓXIMOS 7 DÍAS</div>
      <div style={{border:"1px solid var(--border)"}}>
        {upcoming7.slice(0,30).map(function(u,i){
          var name=u.member.member?(u.member.member.displayname||u.member.member.firstname):"Crew #"+u.member.ref.split("/").pop();
          return <div key={i} className="clickrow" onClick={function(){onPrj(u.shift.project)}} style={{display:"grid",gridTemplateColumns:"140px 1fr 1fr 100px",gap:12,padding:"10px 16px",borderBottom:"1px solid var(--border)",alignItems:"center",cursor:"pointer"}}>
            <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--accent)",letterSpacing:.5}}>{fdt(u.shift.start)}</div>
            <div style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:600,letterSpacing:.5,textTransform:"uppercase"}}>{name}</div>
            <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--mid)",letterSpacing:.5,textTransform:"uppercase"}}>{u.shift.projectName}</div>
            <div style={{textAlign:"right",fontFamily:"var(--mono)",fontSize:10,color:"var(--dim)"}}>{eur(u.shift.cost)}</div>
          </div>;
        })}
      </div>
    </div>}
  </div>;
}

// ═══════ EQUIPMENT HEATMAP ═══════
function HM({s,onPrj}){
  const[loading,setLoading]=useState(true);
  const[progress,setProgress]=useState({done:0,total:0});
  const[byEquip,setByEquip]=useState({});
  const[view,setView]=useState("ranking");
  const[expanded,setExpanded]=useState({});

  useEffect(function(){
    var cached=cache.get("equipment_aggregate");
    if(cached&&cached.data&&Date.now()-cached.ts<600000){
      setByEquip(cached.data);
      setLoading(false);
      return;
    }
    var cancelled=false;
    (async function(){
      var now=Date.now();
      var cutoff=now-14*86400000; // active and recent past
      var targets=(s.prjAll||[]).filter(function(p){
        var end=p.planperiod_end?new Date(p.planperiod_end).getTime():null;
        return end&&end>=cutoff;
      });
      setProgress({done:0,total:targets.length});
      var agg={};
      var idx=0;
      async function worker(){
        while(idx<targets.length){
          var i=idx++;
          var p=targets[i];
          try{
            var r=await apiGet("rentman","/projects/"+p.id+"/projectequipment?limit=300");
            var rows=r&&r.data?r.data:(Array.isArray(r)?r:[]);
            rows.forEach(function(it){
              if(!it.equipment)return;
              var k=it.equipment;
              if(!agg[k])agg[k]={ref:k,name:it.name||"—",bookings:[],totalQty:0,hasMissings:false};
              agg[k].bookings.push({
                projectId:p.id,
                projectName:p.displayname||p.name||("PRJ "+p.id),
                project:p,
                qty:it.quantity||0,
                start:p.equipment_period_from||p.planperiod_start,
                end:p.equipment_period_to||p.planperiod_end,
                hasMissings:!!it.has_missings
              });
              agg[k].totalQty+=(it.quantity||0);
              if(it.has_missings)agg[k].hasMissings=true;
            });
          }catch(e){}
          if(cancelled)return;
          setProgress(function(pp){return{done:pp.done+1,total:pp.total}});
        }
      }
      await Promise.all([worker(),worker(),worker(),worker(),worker()]);
      if(cancelled)return;
      // Compute conflicts (overlapping windows for same equipment)
      Object.keys(agg).forEach(function(k){
        var bs=agg[k].bookings;
        var conflicts=[];
        for(var i=0;i<bs.length;i++){
          for(var j=i+1;j<bs.length;j++){
            var a=bs[i],b=bs[j];
            if(!a.start||!b.start)continue;
            var as=new Date(a.start).getTime(),ae=new Date(a.end||a.start).getTime();
            var bs2=new Date(b.start).getTime(),be=new Date(b.end||b.start).getTime();
            if(as<=be&&bs2<=ae){conflicts.push([i,j])}
          }
        }
        agg[k].conflictPairs=conflicts;
        agg[k].projectCount=bs.length;
      });
      cache.set("equipment_aggregate",agg);
      setByEquip(agg);
      setLoading(false);
    })();
    return function(){cancelled=true};
  },[s.prjAll]);

  var items=useMemo(function(){
    var arr=Object.values(byEquip);
    return arr.sort(function(a,b){return b.totalQty-a.totalQty});
  },[byEquip]);

  var withConflicts=useMemo(function(){return items.filter(function(it){return it.conflictPairs&&it.conflictPairs.length>0})},[items]);
  var withMissings=useMemo(function(){return items.filter(function(it){return it.hasMissings})},[items]);
  var totalQty=useMemo(function(){return items.reduce(function(a,it){return a+it.totalQty},0)},[items]);

  var fdShort=function(d){if(!d)return"—";return new Date(d).toLocaleDateString("es-ES",{day:"2-digit",month:"short"})};

  if(loading){
    var pct=progress.total?Math.round(progress.done/progress.total*100):0;
    return <div>
      <Ref code="SEC-008"/><h2 className="sec-title" style={{fontFamily:"var(--mono)",fontSize:10,fontWeight:400,letterSpacing:4,textTransform:"uppercase",color:"var(--mid)",marginTop:4,marginBottom:40}}>UTILIZACIÓN DE EQUIPO</h2>
      <div style={{padding:60,textAlign:"center"}}>
        <div style={{fontFamily:"var(--mono)",fontSize:10,letterSpacing:3,color:"var(--mid)",textTransform:"uppercase",marginBottom:16,animation:"blink 1.5s infinite"}}>RECOPILANDO RESERVAS · {progress.done}/{progress.total}</div>
        <div style={{maxWidth:400,margin:"0 auto",height:3,background:"var(--border)",position:"relative"}}><div style={{position:"absolute",top:0,left:0,height:"100%",width:pct+"%",background:"var(--accent)",transition:"width 0.3s"}}/></div>
      </div>
    </div>;
  }

  var list=view==="conflicts"?withConflicts:view==="missings"?withMissings:items;

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:28,gap:16,flexWrap:"wrap"}}>
      <div><Ref code="SEC-008"/><h2 className="sec-title" style={{fontFamily:"var(--mono)",fontSize:10,fontWeight:400,letterSpacing:4,textTransform:"uppercase",color:"var(--mid)",marginTop:4}}>UTILIZACIÓN DE EQUIPO</h2></div>
      <div style={{display:"flex",border:"1px solid var(--border)"}}>
        {[["ranking","RANKING"],["conflicts","CONFLICTOS"],["missings","FALTANTES"]].map(function(x){return <button key={x[0]} onClick={function(){setView(x[0])}} style={{padding:"8px 16px",border:"none",borderRight:"1px solid var(--border)",background:view===x[0]?"var(--accent)":"transparent",color:view===x[0]?"var(--white)":"var(--mid)",fontFamily:"var(--mono)",fontSize:9,letterSpacing:2,cursor:"pointer"}}>{x[1]}</button>})}
      </div>
    </div>

    <div className="mrow" style={{display:"flex",border:"1px solid var(--border)",marginBottom:32,flexWrap:"wrap"}}>
      <MetricCell label="Items Rastreados" value={String(items.length)}/>
      <MetricCell label="Reservas Totales" value={String(totalQty)} sub="UNIDADES"/>
      <MetricCell label="Conflictos" value={String(withConflicts.length)} highlight/>
      <MetricCell label="Faltantes" value={String(withMissings.length)} sub="HAS_MISSINGS"/>
    </div>

    <div style={{border:"1px solid var(--border)"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 90px 110px 110px 70px",padding:"10px 16px",borderBottom:"1px solid var(--border)",fontFamily:"var(--mono)",fontSize:9,letterSpacing:2,color:"var(--mid)",textTransform:"uppercase"}}>
        <div>EQUIPO</div>
        <div style={{textAlign:"right"}}>QTY TOTAL</div>
        <div style={{textAlign:"right"}}>PROYECTOS</div>
        <div style={{textAlign:"right"}}>CONFLICTOS</div>
        <div style={{textAlign:"right"}}>STATUS</div>
      </div>
      {list.length===0&&<div style={{padding:40,textAlign:"center",fontFamily:"var(--mono)",fontSize:10,color:"var(--dim)",letterSpacing:2}}>SIN RESULTADOS</div>}
      {list.slice(0,80).map(function(it,i){
        var isExp=expanded[it.ref];
        var hasC=it.conflictPairs&&it.conflictPairs.length>0;
        return <div key={i} style={{borderBottom:"1px solid var(--border)"}}>
          <div onClick={function(){setExpanded(function(p){var n={};for(var x in p)n[x]=p[x];n[it.ref]=!n[it.ref];return n})}} className="clickrow" style={{display:"grid",gridTemplateColumns:"1fr 90px 110px 110px 70px",padding:"12px 16px",alignItems:"center",cursor:"pointer"}}>
            <div style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:500,textTransform:"uppercase",letterSpacing:.3,color:"var(--black)"}}>{it.name}</div>
            <div style={{textAlign:"right",fontFamily:"var(--mono)",fontSize:12,fontWeight:600,color:"var(--accent)"}}>{it.totalQty}</div>
            <div style={{textAlign:"right",fontFamily:"var(--mono)",fontSize:11,color:"var(--mid)"}}>{it.projectCount}</div>
            <div style={{textAlign:"right",fontFamily:"var(--mono)",fontSize:11,fontWeight:hasC?700:400,color:hasC?"var(--danger)":"var(--dim)"}}>{hasC?it.conflictPairs.length:"—"}</div>
            <div style={{textAlign:"right"}}>
              {it.hasMissings&&<span style={{fontFamily:"var(--mono)",fontSize:8,letterSpacing:1,padding:"2px 6px",background:"rgba(180,68,68,0.1)",color:"var(--danger)"}}>FALTA</span>}
            </div>
          </div>
          {isExp&&<div style={{padding:"4px 16px 16px",background:"#fafaf6"}}>
            <div style={{fontFamily:"var(--mono)",fontSize:9,letterSpacing:2,color:"var(--mid)",textTransform:"uppercase",margin:"8px 0"}}>RESERVAS</div>
            {it.bookings.sort(function(a,b){return new Date(a.start)-new Date(b.start)}).map(function(bk,bi){
              var inConflict=hasC&&it.conflictPairs.some(function(p){return p[0]===bi||p[1]===bi});
              return <div key={bi} onClick={function(e){e.stopPropagation();onPrj(bk.project)}} className="clickrow" style={{display:"grid",gridTemplateColumns:"1.6fr 80px 1fr",gap:12,padding:"6px 12px",borderBottom:"1px solid var(--border)",alignItems:"center",cursor:"pointer"}}>
                <div style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:500,textTransform:"uppercase",color:inConflict?"var(--danger)":"var(--black)"}}>{bk.projectName}</div>
                <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--accent)",textAlign:"right"}}>{bk.qty}x</div>
                <div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--dim)",textAlign:"right"}}>{fdShort(bk.start)} → {fdShort(bk.end)}</div>
              </div>;
            })}
          </div>}
        </div>;
      })}
    </div>
    {list.length>80&&<div style={{padding:"12px 16px",fontFamily:"var(--mono)",fontSize:9,color:"var(--dim)",letterSpacing:1,textAlign:"center"}}>MOSTRANDO 80 DE {list.length}</div>}
  </div>;
}

// ═══════ ROOT ═══════
function App(){
  const[authed,setAuthed]=useState(function(){return!!auth.token()});
  useEffect(function(){
    var h=function(){setAuthed(false)};
    window.addEventListener("hypnos-auth-required",h);
    return function(){window.removeEventListener("hypnos-auth-required",h)};
  },[]);
  if(!authed)return <LoginScreen onLogin={setAuthed}/>;
  return <Dashboard onLogout={function(){auth.logout();setAuthed(false)}}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
